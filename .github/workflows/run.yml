name: Run Snapchat Resolver

on:
  workflow_dispatch:   # 👈 enables manual "Run workflow" button
  push:                # 👈 runs automatically on pushes
    branches:
      - main           # adjust if your default branch is different

jobs:
  run-resolver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install

      - name: Run resolver script
        run: |
          python main.py

      - name: Commit updated output.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output.txt
          git commit -m "Update output.txt from workflow" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main

