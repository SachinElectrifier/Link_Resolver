name: Run Snapchat Resolver

on:
  push:
    paths:
      - "input_links.txt"   # run only when input_links.txt changes
      - "main.py"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install

      - name: Run resolver
        run: |
          python main.py

      - name: Commit output.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output.json
          git commit -m "Update output.json from workflow" || echo "No changes to commit"
          git push
