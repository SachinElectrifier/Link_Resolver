name: Run Snapchat Resolver

on:
  workflow_dispatch:   # allows manual run from Actions tab
  push:                # also runs automatically on pushes
    branches:
      - main

jobs:
  run-resolver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # v4 runs on Node 20/24 automatically

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install

      - name: Run resolver script
        run: |
          python main.py

      - name: Commit updated output.txt
        uses: EndBug/add-and-commit@v9
        with:
          add: 'output.txt'
          message: 'Update output.txt from workflow'
